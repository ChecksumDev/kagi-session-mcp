name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Run release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    name: Build ${{ matrix.target }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            linker: aarch64-linux-gnu-gcc
            cc: aarch64-linux-gnu-gcc
            ar: aarch64-linux-gnu-ar
            apt-packages: gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    env:
      BIN_NAME: kagi-session-mcp
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compile tooling (linux aarch64)
        if: matrix.apt-packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt-packages }}

      - name: Build release binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.cc }}
          AR_aarch64_unknown_linux_gnu: ${{ matrix.ar }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        id: stage
        shell: bash
        run: |
          version="${{ needs.release-please.outputs.version }}"
          target="${{ matrix.target }}"
          name="${BIN_NAME}-v${version}-${target}"
          mkdir -p "dist/${name}"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${target}/release/${BIN_NAME}.exe" "dist/${name}/"
          else
            cp "target/${target}/release/${BIN_NAME}" "dist/${name}/"
          fi
          # Include license/readme if they exist so the archive is self-contained.
          for f in README.md LICENSE LICENSE-MIT; do
            [[ -f "$f" ]] && cp "$f" "dist/${name}/" || true
          done

          cd dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "${name}.zip" "${name}"
            echo "asset=dist/${name}.zip" >> "$GITHUB_OUTPUT"
            echo "asset_name=${name}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${name}.tar.gz" "${name}"
            echo "asset=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
            echo "asset_name=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          asset="${{ steps.stage.outputs.asset }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.stage.outputs.asset }}

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          ASSET: ${{ steps.stage.outputs.asset }}
        shell: bash
        run: |
          gh release upload "$TAG" "$ASSET" "$ASSET.sha256" --clobber
